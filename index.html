<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Monitor TV - Surat Darurat</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* HEADER UTAMA */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 12px 20px;
            border-radius: 8px;
            border-bottom: 4px solid #ff4d4d;
            margin-bottom: 15px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header h2 { margin: 0; color: #ff4d4d; letter-spacing: 1px; text-transform: uppercase; font-size: 22px;}
        #clock { font-size: 18px; font-weight: bold; color: #ff4d4d; }

        /* TOMBOL PANEL KONTROL (GEAR ICON) */
        .btn-gear {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-gear:hover { background: #ff4d4d; border-color: #ff4d4d; }

        /* PANEL MONITOR FULL SCREEN */
        .panel-monitor {
            flex: 1;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        /* TABEL MONITOR STYLE */
        .table-container {
            flex: 1;
            overflow-y: auto;
            margin-top: 5px;
        }
        table { width: 100%; border-collapse: collapse; background: #181818; }
        th, td { padding: 14px 12px; text-align: left; border: 1px solid #2d2d2d; font-size: 14px; }
        th { background-color: #ff4d4d; color: white; position: sticky; top: 0; z-index: 5; letter-spacing: 0.5px;}
        tr:nth-child(even) { background-color: #222; }
        tr:hover { background-color: #2a2a2a; }
        
        .btn-view { background: #00adb5; color: white; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; border: none; cursor: pointer;}
        .btn-view:hover { background: #007a80; }
        .btn-edit { background: #f0ad4e; color: #121212; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; margin-left: 5px;}
        .btn-edit:hover { background: #ec971f; }

        /* JENDELA POPUP (MODAL BASE) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            display: none; 
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e1e1e;
            width: 500px;
            max-width: 90%;
            max-height: 90vh;
            border-radius: 10px;
            border: 2px solid #ff4d4d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        /* Lebar khusus untuk preview file agar puas melihat dokumen */
        .wide-modal { width: 85% !important; height: 85% !important; }
        
        .modal-header {
            background: #2a2a2a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
