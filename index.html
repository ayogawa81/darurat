<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Monitor TV - Slog KORPASGAT</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* THEME: DARK COMMAND CENTER */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 12px 20px; border-radius: 8px; border-bottom: 3px solid #ff4d4d; margin-bottom: 15px; }
        .header h2 { margin: 0; color: #ff4d4d; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        #clock { font-size: 16px; font-weight: bold; color: #ff4d4d; }
        .btn-gear { background: #262626; color: #fff; border: 1px solid #404040; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
        
        .panel-monitor { flex: 1; background: #141414; padding: 15px; border-radius: 8px; border: 1px solid #262626; display: flex; flex-direction: column; min-height: 0; }
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border: 1px solid #262626; font-size: 13px; }
        th { background-color: #ff4d4d; color: white; position: sticky; top: 0; z-index: 5; }
        tr:nth-child(even) { background-color: #1a1a1a; }
        
        .btn-view { background: #00adb5; color: white; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-edit { background: #f39c12; color: #000; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: 4px; }

        /* MODAL / POPUP */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #ff4d4d; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; width: 500px; max-height: 90vh; }
        .wide-modal { width: 95% !important; height: 90% !important; }
        .modal-header { background: #262626; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .modal-body { flex: 1; padding: 15px; overflow: auto; }

        /* FORM */
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        input, textarea { width: 100%; padding: 8px; background: #262626; border: 1px solid #404040; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 10px; background: #ff4d4d; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* EXCEL RENDER TABLE */
        .excel-table { width: 100%; border-collapse: collapse; background: #fff; color: #000; }
        .excel-table td, .excel-table th { border: 1px solid #ccc; padding: 6px; font-size: 11px; }
        .excel-table th { background: #eee; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2>🖥️ MONITOR TV - SLOG KORPASGAT</h2>
            <button class="btn-gear" onclick="openControlModal()" style="margin-top:5px;">⚙️ PANEL KONTROL</button>
        </div>
        <div id="clock"></div>
    </div>

    <div class="panel-monitor">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>No. Surat</th>
                        <th>Tanggal</th>
                        <th>Nama Surat</th>
                        <th>Dari</th>
                        <th>Tentang</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tvTableBody">
                    <tr><td colspan="6" style="text-align:center;">Memuat Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="controlModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <span id="formTitle" style="color:#ff4d4d; font-weight:bold;">INPUT DATA</span>
                <button onclick="closeControlModal()" style="background:#ff4d4d; color:#fff; border:none; padding:4px 8px; border-radius:3px; cursor:pointer;">TUTUP X</button>
            </div>
            <div class="modal-body">
                <form id="suratForm">
                    <div class="form-group"><label>No. Surat:</label><input type="text" id="noSurat" required></div>
                    <div class="form-group"><label>Tanggal:</label><input type="date" id="tanggal" required></div>
                    <div class="form-group"><label>Nama Dokumen:</label><input type="text" id="namaSurat" required></div>
                    <div class="form-group"><label>Dari:</label><input type="text" id="dari" required></div>
                    <div class="form-group"><label>Perihal:</label><textarea id="tentang" required></textarea></div>
                    <div class="form-group">
                        <label>Pilih File Excel/Gambar:</label>
                        <input type="file" id="fileSurat">
                    </div>
                    <button type="submit" id="btnKirim" class="btn-action">KIRIM KE LAYAR TV</button>
                    <button type="button" id="btnBatalEdit" class="btn-action" style="background:#555; display:none; margin-top:5px;" onclick="resetFormMode()">BATAL EDIT</button>
                </form>

                <div style="background:#000; padding:10px; margin-top:15px; border-radius:5px; border:1px solid #333;">
                    <label>Master Key:</label><input type="text" id="secretKey" style="font-size:10px;">
                    <label>Bin ID:</label><input type="text" id="binId" style="font-size:10px;">
                    <button onclick="saveCloudSettings()" style="width:100%; margin-top:10px; background:#27ae60; color:#fff; border:none; padding:5px; border-radius:3px; cursor:pointer; font-size:11px;">SIMPAN CONFIG CLOUD</button>
                </div>
            </div>
        </div>
    </div>

    <div id="fileModal" class="modal-overlay">
        <div class="modal-content wide-modal">
            <div class="modal-header">
                <span id="modalDocTitle" style="color:#ff4d4d; font-weight:bold;">PRATINJAU</span>
                <button onclick="closePreviewModal()" style="background:#ff4d4d; color:#fff; border:none; padding:4px 8px; border-radius:3px; cursor:pointer;">TUTUP X</button>
            </div>
            <div id="modalViewerBody" class="modal-body" style="background:#fff;"></div>
        </div>
    </div>

<script>
    let databaseSurat = [];
    let editIndex = null;
    let fileDataTerimpan = "";

    // Jam Digital
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('id-ID'); }, 1000);

    // Auto Refresh 15 detik
    setInterval(() => { if (editIndex === null) fetchFromCloud(); }, 15000);

    window.onload = function() {
        document.getElementById('secretKey').value = localStorage.getItem('cloud_key') || '';
        document.getElementById('binId').value = localStorage.getItem('cloud_bin') || '';
        fetchFromCloud();
    }

    function saveCloudSettings() {
        localStorage.setItem('cloud_key', document.getElementById('secretKey').value.trim());
        localStorage.setItem('cloud_bin', document.getElementById('binId').value.trim());
        alert("Config Cloud Tersimpan!");
        fetchFromCloud();
    }

    function fetchFromCloud() {
        const key = localStorage.getItem('cloud_key');
        const bin = localStorage.getItem('cloud_bin');
        if(!key || !bin) return;
        fetch(`https://api.jsonbin.io/v3/b/${bin}/latest`, { headers: { 'X-Master-Key': key } })
        .then(res => res.json())
        .then(data => {
            databaseSurat = Array.isArray(data.record) ? data.record : [];
            const tbody = document.getElementById('tvTableBody');
            tbody.innerHTML = databaseSurat.length ? "" : "<tr><td colspan='6' style='text-align:center;'>Database Kosong</td></tr>";
            [...databaseSurat].reverse().forEach((s, i) => {
                const idx = databaseSurat.length - 1 - i;
                tbody.innerHTML += `<tr><td>${s.noSurat}</td><td>${s.tanggal}</td><td>${s.namaSurat}</td><td>${s.dari}</td><td>${s.tentang}</td><td><button class="btn-view" onclick="openPreviewModal(${idx})">LIHAT</button><button class="btn-edit" onclick="aktifkanModeEdit(${idx})">EDIT</button></td></tr>`;
            });
        }).catch(e => console.log("Offline/Error"));
    }

    function openPreviewModal(idx) {
        const s = databaseSurat[idx];
        document.getElementById('modalDocTitle').innerText = s.namaSurat;
        const body = document.getElementById('modalViewerBody');
        if(s.fileData.startsWith("<table")) { body.innerHTML = s.fileData; }
        else if(s.fileData.startsWith("data:image")) { body.innerHTML = `<img src="${s.fileData}" style="max-width:100%;">`; }
        else { body.innerHTML = `<iframe src="${s.fileData}" style="width:100%; height:100%; border:none;"></iframe>`; }
        document.getElementById('fileModal').style.display = 'flex';
    }

    function closePreviewModal() { document.getElementById('fileModal').style.display = 'none'; }
    function openControlModal() { document.getElementById('controlModal').style.display = 'flex'; }
    function closeControlModal() { if(!editIndex) document.getElementById('controlModal').style.display = 'none'; }

    function aktifkanModeEdit(idx) {
        editIndex = idx;
        const s = databaseSurat[idx];
        document.getElementById('noSurat').value = s.noSurat;
        document.getElementById('tanggal').value = s.tanggal;
        document.getElementById('namaSurat').value = s.namaSurat;
        document.getElementById('dari').value = s.dari;
        document.getElementById('tentang').value = s.tentang;
        fileDataTerimpan = s.fileData;
        document.getElementById('formTitle').innerText = "EDIT DATA";
        document.getElementById('btnKirim').innerText = "SIMPAN PERUBAHAN";
        document.getElementById('btnBatalEdit').style.display = "block";
        openControlModal();
    }

    function resetFormMode() {
        editIndex = null;
        document.getElementById('suratForm').reset();
        document.getElementById('formTitle').innerText = "INPUT DATA";
        document.getElementById('btnKirim').innerText = "KIRIM KE LAYAR TV";
        document.getElementById('btnBatalEdit').style.display = "none";
        closeControlModal();
    }

    document.getElementById('suratForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const key = localStorage.getItem('cloud_key');
        const bin = localStorage.getItem('cloud_bin');
        const file = document.getElementById('fileSurat').files[0];
        const btn = document.getElementById('btnKirim');
        btn.disabled = true; btn.innerText = "SINKRONISASI CLOUD...";

        const uploadData = (fData) => {
            const newData = {
                noSurat: document.getElementById('noSurat').value,
                tanggal: document.getElementById('tanggal').value,
                namaSurat: document.getElementById('namaSurat').value,
                dari: document.getElementById('dari').value,
                tentang: document.getElementById('tentang').value,
                fileData: fData
            };

            // Ambil data terbaru dulu
            fetch(`https://api.jsonbin.io/v3/b/${bin}/latest`, { headers: { 'X-Master-Key': key } })
            .then(res => res.json())
            .then(data => {
                let db = Array.isArray(data.record) ? data.record : [];
                if(editIndex !== null) db[editIndex] = newData; else db.push(newData);
                
                // Simpan kembali (Gunakan ?versioning=false untuk menghemat space)
                return fetch(`https://api.jsonbin.io/v3/b/${bin}?versioning=false`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': key },
                    body: JSON.stringify(db)
                });
            })
            .then(res => {
                if(!res.ok) throw new Error("File terlalu besar!");
                alert("Data Berhasil Tayang di TV!");
                resetFormMode(); fetchFromCloud();
            })
            .catch(err => alert("ERROR: File Excel terlalu besar/padat untuk Cloud gratis. Kurangi baris/formatting Excel."))
            .finally(() => { btn.disabled = false; btn.innerText = "KIRIM KE LAYAR TV"; });
        };

        if(file) {
            const reader = new FileReader();
            if(file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                reader.readAsArrayBuffer(file);
                reader.onload = (ev) => {
                    const wb = XLSX.read(ev.target.result, {type: 'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    // KONVERSI RAW: Tanpa style, hanya tabel polos agar hemat data
                    const rawHtml = XLSX.utils.sheet_to_html(ws, { header: '', footer: '' });
                    const cleanHtml = rawHtml.substring(rawHtml.indexOf("<table>")).replace("<table>", "<table class='excel-table'>");
                    uploadData(cleanHtml);
                };
            } else {
                reader.readAsDataURL(file);
                reader.onload = () => uploadData(reader.result);
            }
        } else {
            uploadData(fileDataTerimpan);
        }
    });
</script>
</body>
</html>
